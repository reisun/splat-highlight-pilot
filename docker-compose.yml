services:
  api:
    build: .
    ports:
      - "8030:8000"
    volumes:
      - shared-data:/shared-data
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      default:
        aliases:
          - splat-highlight-pilot-api
      splat-highlight-pilot-net:
        aliases:
          - splat-highlight-pilot-api

volumes:
  shared-data:
    name: shared-data

networks:
  default:
  splat-highlight-pilot-net:
    name: splat-highlight-pilot-net
