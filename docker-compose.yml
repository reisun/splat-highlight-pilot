services:
  api:
    build: .
    ports:
      - "8030:8000"
    volumes:
      - shared-data:/shared-data
      - .:/app
    user: root
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - UV_PROJECT_ENVIRONMENT=/opt/venv
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  shared-data:
    name: shared-data
